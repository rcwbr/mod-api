name: Push workflow
on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
jobs:
  devcontainer-cache-build:
    uses: rcwbr/devcontainer-cache-build/.github/workflows/devcontainer-cache-build.yaml@0.9.2
    permissions:
      packages: write
  # Overrides to include dive-efficiency info in release
  release-it-workflow:
    uses: rcwbr/release-it-gh-workflow/.github/workflows/release-it-workflow.yaml@0.5.2
    with:
      app-id: 4328824
      app-environment: Repo release
      release-it-config: .release-it.json
      release-it-image: ghcr.io/rcwbr/release-it-docker-file-bumper:0.8.1
      artifact-name: ${{ format('refs/heads/{0}', github.event.repository.default_branch) == github.ref && 'dive_results' || '' }}
    secrets:
      app-secret: ${{ secrets.RELEASE_IT_GITHUB_APP_KEY }}
    needs: dive-efficiency
  pre-commit:
    if: github.event_name == 'pull_request'
    uses: rcwbr/dockerfile-partials/.github/workflows/pre-commit.yaml@0.4.0
    needs: devcontainer-cache-build
    with:
      pre-commit-image: ${{ fromJSON(needs.devcontainer-cache-build.outputs.devcontainer-cache-image-all_configs).target.pre-commit.args.DEVCONTAINER_PRE_COMMIT_IMAGE }}
  pages:
    # Release pages on tags only
    if: github.ref_type == 'tag'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: devcontainer-cache-build
    container:
      image: ${{ needs.devcontainer-cache-build.outputs.devcontainer-cache-image-ref }}
      options: --user root
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Authenticate as app
        id: app-token
        uses: actions/create-github-app-token@v2.2.1
        with:
          app-id: 4328829
          private-key: ${{ secrets.DOCS_GITHUB_APP_KEY }}
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Mike
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com
          git config --global user.name github-actions[bot]
          pip install -e .
          # Update docs for the default branch
          mike deploy --branch mkdocs --update-aliases --push ${{ github.event.repository.default_branch }}
          # Update docs for the release tag
          mike deploy --branch mkdocs --update-aliases --push $(echo ${{ github.ref_name }} | sed 's|/|-|g')
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: mkdocs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          token: ${{ github.token }}
  build-docker-images:
    name: Build Docker images
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7
      - # TODO remove after more satisfactory options exist to use latest Docker
        # version while avoiding this issue: https://github.com/docker/buildx/issues/59
        name: Set up Docker
        uses: docker/setup-docker-action@v4
        with:
          version: 27.3.1
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - name: GHCR Login
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker Buildx builder setup
        uses: docker/setup-buildx-action@v3.11.1
        with:
          version: v0.19.1
      - id: docker-bake-mod-api
        name: Docker Bake mod-api
        uses: docker/bake-action@v7.3.0
        with:
          source: https://github.com/rcwbr/dockerfile-partials.git#0.13.0
          files: "github-cache-bake.hcl, uv-project/docker-bake.hcl, cwd://docker-bake.hcl"
          targets: mod-api
        env:
          REGISTRY: ghcr.io/rcwbr/
          IMAGE_NAME: mod-api
    outputs:
      mod-api: ${{ steps.docker-bake-mod-api.outputs.metadata }}
  dive-efficiency:
    name: Dive Docker image space efficiency analysis
    needs: build-docker-images
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.0
      - name: GHCR Login
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Dive JSON
        run: |
          docker run \
            --rm \
            -e CI=true \
            -v $(pwd)/.dive-ci:/etc/.dive-ci \
            -v $(pwd)/out:/out \
            -v /var/run/docker.sock:/var/run/docker.sock \
            wagoodman/dive:v0.13.1 \
            --ci-config /etc/.dive-ci \
            ${{ format(
              '{0}{1}',
              (github.ref_name == github.event.repository.default_branch && '--json /out/dive.json ' || ''),
              fromJSON(needs.build-docker-images.outputs.mod-api).mod-api['image.name']
            ) }}
      - name: Upload Dive result
        if: github.ref_name == github.event.repository.default_branch
        uses: actions/upload-artifact@v5.0.0
        with:
          name: dive_results
          path: out/dive.json
  pytest:
    runs-on: ubuntu-24.04
    needs: devcontainer-cache-build
    container:
      image: ${{ needs.devcontainer-cache-build.outputs.devcontainer-cache-image-ref }}
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7
      - name: pytest-cov
        env:
          DEVCONTAINER_HOST_WORKSPACE_MOUNT: ${{ github.workspace }}
          DEVCONTAINER_WORKSPACE_PATH: ${{ github.workspace }}
          PYTEST_DEBUG_TEMPROOT: ${{ runner.temp }}
        run: |
          pip install -e .
          pytest \
            --cov=src \
            --cov-branch \
            --cov-report=xml \
            --junitxml=junit.xml \
            -vv \
            --tb=long \
            -o log_cli=true \
            -o log_cli_level=DEBUG \
            tests/unit
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5.5.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: junit.xml
  pypi-publish:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-24.04
    environment:
      name: pypi
    needs: devcontainer-cache-build
    container:
      image: ${{ needs.devcontainer-cache-build.outputs.devcontainer-cache-image-ref }}
      options: --user root
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build
        run: $UV_PROJECT_ENVIRONMENT/bin/uv build
      - name: Publish
        run: $UV_PROJECT_ENVIRONMENT/bin/uv publish
